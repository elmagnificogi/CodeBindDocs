name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Check tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Git tag v$TAG must match package.json version $PKG"
            exit 1
          fi

      - run: npm run test:unit

      - name: Package VSIX
        run: npm run package

      - name: Publish to VS Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::Missing secret VSCE_PAT"
            exit 1
          fi
          VSIX="$(ls -1 *.vsix | head -n1)"
          echo "Publishing $VSIX to Visual Studio Marketplace"
          npx @vscode/vsce publish --no-dependencies --packagePath "$VSIX" -p "$VSCE_PAT"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::Missing secret OVSX_PAT"
            exit 1
          fi
          VSIX="$(ls -1 *.vsix | head -n1)"
          echo "Publishing $VSIX to Open VSX"
          npx ovsx publish --no-dependencies "$VSIX" -p "$OVSX_PAT"
